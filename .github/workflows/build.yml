name: Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.11, 3.12, 3.13, 3.14]
        poetry-version: [2.2.1]
        os: [ubuntu-slim]

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Poetry
        id: cache-poetry
        uses: actions/cache@v4
        env:
          cache-name: cache-poetry
        with:
          path: |
            ~/.poetry
            ~/.profile
            ~/.bash_profile
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.poetry-version }}

      - name: Install Poetry
        uses: Gr1N/setup-poetry@v9
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        with:
          poetry-version: ${{ matrix.poetry-version }}

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        env:
          cache-name: cache-poetry-deps
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-build-${{ env.cache-name }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: poetry install

      - name: Run pre-commit checks
        run: |
          echo "$(poetry run python --version)"
          poetry run pre-commit run --all-files

      - name: Run tests
        run: poetry run pytest -vv

